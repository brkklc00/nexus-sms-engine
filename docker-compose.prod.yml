version: "3.9"

services:
  web:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:deploy && node server.js"

  worker:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    command: sh -c "npm run prisma:deploy && npm run dev:worker"
