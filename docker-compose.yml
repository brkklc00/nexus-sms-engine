version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus_sms_postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_sms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_sms"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus_sms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: nexus_sms_web
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_sms?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:deploy && node server.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build: .
    container_name: nexus_sms_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus_sms?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run prisma:deploy && npm run worker"

volumes:
  postgres_data:
  redis_data:
